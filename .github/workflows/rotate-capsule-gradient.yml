name: rotate capsule gradient

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  rotate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate logo-matched capsule url
        shell: bash
        run: |
          palette="FF000D,E63E3E"
          url="https://capsule-render.vercel.app/api?type=waving&color=${palette}&height=280&section=header&text=Hey%2C%20I'm%20Aji%20Nur%20Aji&fontSize=58&animation=fadeIn2&fontAlignY=42&desc=Full-Stack%20Developer%20%7C%20Informatics%20Student&descSize=20&descAlignY=60"
          echo "capsule_url=$url" >> $GITHUB_ENV
          echo "Generated capsule URL: $url"

      - name: checkout repository
        uses: actions/checkout@v4

      - name: download capsule asset
        shell: bash
        run: |
          mkdir -p dist
          curl -sSL -o dist/capsule-header.svg "${{ env.capsule_url }}"

      - name: push capsule assets to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
